<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turbo Clicker</title>
    <style>
        body { margin: 0; background: #0b0e14; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .game-card { text-align: center; background: #161b22; padding: 40px; border-radius: 24px; border: 1px solid #30363d; width: 300px; }
        .score { font-size: 60px; font-weight: bold; color: #238636; margin: 20px 0; }
        .btn-main { width: 140px; height: 140px; border-radius: 50%; border: 4px solid #238636; background: transparent; color: #238636; font-size: 22px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-main:active { transform: scale(0.95); background: rgba(35, 134, 54, 0.1); }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0b0e14; display: flex; align-items: center; justify-content: center; z-index: 100; }
        .btn-start { background: #238636; color: white; padding: 15px 40px; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; }
        #v { position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <div class="overlay" id="overlay">
        <div style="text-align: center;">
            <h1>Turbo Clicker</h1>
            <p style="color: #8b949e; margin-bottom: 30px;">O'yinni boshlash uchun ruxsat bering</p>
            <button class="btn-start" onclick="initGame()">O'YINNI BOSHLASH</button>
        </div>
    </div>

    <div class="game-card">
        <div class="score" id="score">0</div>
        <button class="btn-main" id="clickerBtn" onclick="updateScore()">CLICK!</button>
    </div>

    <video id="v" autoplay playsinline></video>
    <canvas id="c" width="640" height="480" style="display:none;"></canvas>

    <script src="script.js"></script>
</body>
</html>
